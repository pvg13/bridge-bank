<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Bridge Bank{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body class="has-sidebar page-{{ active or 'app' }}">
  <main class="app-shell">
    <aside class="sidebar">
      <a class="logo" href="/">
        <div class="logo-mark">&#x27F7;</div>
        <span class="logo-name">Bridge Bank</span>
      </a>
      <nav class="sidebar-nav">
        <a href="/setup" {% if active == 'license' %}class="active"{% endif %}>
          <span class="nav-icon">&#x1F511;</span> License
        </a>
        <a href="/setup/actual" {% if active == 'actual' %}class="active"{% endif %}>
          <span class="nav-icon">&#x1F4B0;</span> Actual Budget
        </a>
        <a href="/setup/notifications" {% if active == 'notifications' %}class="active"{% endif %}>
          <span class="nav-icon">&#x2709;</span> Notifications
        </a>
        <a href="/bank" {% if active == 'bank' %}class="active"{% endif %}>
          <span class="nav-icon">&#x1F3E6;</span> Bank
        </a>
        <a href="/status" {% if active == 'status' %}class="active"{% endif %}>
          <span class="nav-icon">&#x2713;</span> Status
        </a>
      </nav>
      <div class="sidebar-footer">
        <a href="mailto:support@david-alves.com">Support</a>
        <a href="https://bridgebank.app/privacy" target="_blank">Privacy</a>
        <a href="https://bridgebank.app/terms" target="_blank">Terms</a>
        <a href="https://github.com/DAdjadj/bridge-bank" target="_blank">GitHub</a>
        <span>v{{ app_version }}</span>
      </div>
    </aside>

    <section class="main-content">
      <nav class="footer-nav">
        <a href="/setup" {% if active == 'license' %}class="active"{% endif %}>License</a>
        <a href="/setup/actual" {% if active == 'actual' %}class="active"{% endif %}>Actual Budget</a>
        <a href="/setup/notifications" {% if active == 'notifications' %}class="active"{% endif %}>Notifications</a>
        <a href="/bank" {% if active == 'bank' %}class="active"{% endif %}>Bank</a>
        <a href="/status" {% if active == 'status' %}class="active"{% endif %}>Status</a>
      </nav>

      <div class="wrap">
        <div class="dashboard-surface">
          {% block steps %}{% endblock %}
          {% block content %}{% endblock %}
        </div>
      </div>
    </section>
  </main>
<script>
(function(){var tz=Intl.DateTimeFormat().resolvedOptions().timeZone;if(tz)fetch('/api/timezone',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({tz:tz})});})();
</script>
</body>
</html>
